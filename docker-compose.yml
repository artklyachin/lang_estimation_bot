services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot

  bot:
    build: ./bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - GEN_API_TOKEN=${GEN_API_TOKEN}
      - WEBHOOK_HOST=${WEBHOOK_HOST}
      - WEB_PORT=${WEB_PORT}
    volumes:
      - bot_data:/data

volumes:
  caddy_data:
  caddy_config:
  bot_data:
